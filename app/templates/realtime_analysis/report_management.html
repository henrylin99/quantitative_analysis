{% extends "base.html" %}

{% block title %}报告管理 - 实时分析系统{% endblock %}

{% block extra_css %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .report-card, .template-card, .subscription-card {
            border-left: 4px solid #0d6efd;
            transition: transform 0.2s;
        }
        .template-card { border-left-color: #198754; }
        .subscription-card { border-left-color: #ffc107; }
        .report-card:hover, .template-card:hover, .subscription-card:hover {
            transform: translateY(-2px);
        }
        .summary-card {
            min-height: 120px;
        }
        .json-block {
            white-space: pre-wrap;
            font-size: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            padding: 12px;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="container-fluid py-4">
        <div class="row mb-4">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1"><i class="bi bi-file-earmark-text"></i> 报告管理</h2>
                    <p class="text-muted mb-0">管理分析报告、模板和订阅</p>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" onclick="showGenerateReportModal()">
                        <i class="bi bi-plus-circle"></i> 生成报告
                    </button>
                    <button class="btn btn-outline-success" onclick="showCreateTemplateModal()">
                        <i class="bi bi-journal-plus"></i> 新建模板
                    </button>
                    <button class="btn btn-outline-warning" onclick="showCreateSubscriptionModal()">
                        <i class="bi bi-bell"></i> 新建订阅
                    </button>
                    <button class="btn btn-outline-secondary" onclick="refreshData()">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card summary-card bg-primary text-white">
                    <div class="card-body">
                        <div class="small">总报告数</div>
                        <div class="fs-3 fw-bold" id="totalReports">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card summary-card bg-success text-white">
                    <div class="card-body">
                        <div class="small">总模板数</div>
                        <div class="fs-3 fw-bold" id="totalTemplates">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card summary-card bg-warning text-dark">
                    <div class="card-body">
                        <div class="small">总订阅数</div>
                        <div class="fs-3 fw-bold" id="totalSubscriptions">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card summary-card bg-info text-white">
                    <div class="card-body">
                        <div class="small">成功率</div>
                        <div class="fs-3 fw-bold" id="successRate">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-pills mb-4" id="reportTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#reports" type="button">报告列表</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#templates" type="button">模板管理</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#subscriptions" type="button">订阅管理</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#statistics" type="button">统计分析</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="reports" role="tabpanel">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>报告列表</span>
                        <select class="form-select form-select-sm w-auto" id="reportTypeFilter" onchange="filterReports()">
                            <option value="">所有类型</option>
                            <option value="daily_summary">每日市场总结</option>
                            <option value="portfolio_analysis">投资组合分析</option>
                            <option value="risk_assessment">风险评估报告</option>
                            <option value="signal_analysis">交易信号分析</option>
                            <option value="market_overview">市场概览报告</option>
                        </select>
                    </div>
                    <div class="card-body">
                        <div id="reportsContainer" class="row"></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="templates" role="tabpanel">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>模板管理</span>
                        <button class="btn btn-sm btn-outline-success" onclick="showCreateTemplateModal()">新增模板</button>
                    </div>
                    <div class="card-body">
                        <div id="templatesContainer" class="row"></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="subscriptions" role="tabpanel">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>订阅管理</span>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-warning" onclick="showCreateSubscriptionModal()">新增订阅</button>
                            <button class="btn btn-sm btn-outline-primary" onclick="dispatchSubscriptions()">立即分发</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="subscriptionsContainer" class="row"></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="statistics" role="tabpanel">
                <div class="card">
                    <div class="card-header">统计分析</div>
                    <div class="card-body">
                        <div id="statisticsContainer" class="json-block">暂无统计数据</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="generateReportModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">生成报告</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="generateReportForm">
                        <div class="mb-3">
                            <label class="form-label">报告类型</label>
                            <select class="form-select" id="reportType" required>
                                <option value="">请选择报告类型</option>
                                <option value="daily_summary">每日市场总结</option>
                                <option value="portfolio_analysis">投资组合分析</option>
                                <option value="risk_assessment">风险评估报告</option>
                                <option value="signal_analysis">交易信号分析</option>
                                <option value="market_overview">市场概览报告</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">报告名称</label>
                            <input type="text" class="form-control" id="reportName" placeholder="留空则自动生成报告名称">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">模板</label>
                            <select class="form-select" id="templateId">
                                <option value="">使用默认模板或选择现有模板</option>
                            </select>
                        </div>
                        <div class="mb-3" id="portfolioIdGroup" style="display: none;">
                            <label class="form-label">投资组合ID</label>
                            <input type="text" class="form-control" id="portfolioId" placeholder="请输入真实投资组合ID">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="generateReport()">生成报告</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createTemplateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新建模板</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">模板名称</label>
                        <input type="text" class="form-control" id="templateName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">模板类型</label>
                        <select class="form-select" id="templateType">
                            <option value="daily_summary">每日市场总结</option>
                            <option value="portfolio_analysis">投资组合分析</option>
                            <option value="risk_assessment">风险评估报告</option>
                            <option value="signal_analysis">交易信号分析</option>
                            <option value="market_overview">市场概览报告</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="templateDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="createTemplate()">创建模板</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createSubscriptionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新建订阅</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">订阅名称</label>
                        <input type="text" class="form-control" id="subscriptionName" placeholder="订阅名称">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">模板</label>
                        <select class="form-select" id="subscriptionTemplateId"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="subscriberEmail">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">通知渠道</label>
                        <select class="form-select" id="notificationChannels" multiple>
                            <option value="email">email</option>
                            <option value="log" selected>log</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-warning" onclick="createSubscription()">创建订阅</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let reports = [];
        let templates = [];
        let subscriptions = [];

        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            refreshData();
        });

        function setupEventListeners() {
            document.getElementById('reportType').addEventListener('change', function() {
                const portfolioGroup = document.getElementById('portfolioIdGroup');
                portfolioGroup.style.display = ['portfolio_analysis', 'risk_assessment'].includes(this.value) ? 'block' : 'none';
            });
        }

        async function refreshData() {
            await Promise.all([loadReports(), loadTemplates(), loadSubscriptions(), loadStatistics()]);
        }

        async function loadReports() {
            const response = await fetch('/api/realtime-analysis/reports/reports');
            const result = await response.json();
            reports = result.success ? (result.data || []) : [];
            renderReports();
        }

        async function loadTemplates() {
            const response = await fetch('/api/realtime-analysis/reports/templates');
            const result = await response.json();
            templates = result.success ? (result.data || []) : [];
            renderTemplates();
            updateTemplateSelects();
        }

        async function loadSubscriptions() {
            const response = await fetch('/api/realtime-analysis/reports/subscriptions');
            const result = await response.json();
            subscriptions = result.success ? (result.data || []) : [];
            renderSubscriptions();
        }

        async function loadStatistics() {
            const response = await fetch('/api/realtime-analysis/reports/statistics');
            const result = await response.json();
            const stats = result.success ? (result.data || {}) : {};
            document.getElementById('totalReports').textContent = stats.reports ? stats.reports.total : 0;
            document.getElementById('totalTemplates').textContent = stats.templates ? stats.templates.total : 0;
            document.getElementById('totalSubscriptions').textContent = stats.subscriptions ? stats.subscriptions.total : 0;
            document.getElementById('successRate').textContent = stats.reports ? `${(stats.reports.success_rate || 0).toFixed(1)}%` : '0%';
            document.getElementById('statisticsContainer').textContent = JSON.stringify(stats, null, 2);
        }

        function renderReports() {
            const filter = document.getElementById('reportTypeFilter').value;
            const visibleReports = filter ? reports.filter(item => item.report_type === filter) : reports;
            const container = document.getElementById('reportsContainer');
            if (!visibleReports.length) {
                container.innerHTML = '<div class="col-12 text-muted">暂无报告数据</div>';
                return;
            }
            container.innerHTML = visibleReports.map(report => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card report-card">
                        <div class="card-body">
                            <div class="fw-bold">${report.report_name}</div>
                            <div class="small text-muted mb-2">${report.report_type}</div>
                            <div class="small">状态: ${report.report_status || '-'}</div>
                            <div class="small">生成时间: ${report.generated_at || '-'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderTemplates() {
            const container = document.getElementById('templatesContainer');
            if (!templates.length) {
                container.innerHTML = '<div class="col-12 text-muted">暂无模板数据</div>';
                return;
            }
            container.innerHTML = templates.map(template => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card template-card">
                        <div class="card-body">
                            <div class="fw-bold">${template.template_name}</div>
                            <div class="small text-muted mb-2">${template.template_type}</div>
                            <div class="small">${template.description || '无描述'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderSubscriptions() {
            const container = document.getElementById('subscriptionsContainer');
            if (!subscriptions.length) {
                container.innerHTML = '<div class="col-12 text-muted">暂无订阅数据</div>';
                return;
            }
            container.innerHTML = subscriptions.map(item => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card subscription-card">
                        <div class="card-body">
                            <div class="fw-bold">${item.subscription_name}</div>
                            <div class="small text-muted mb-2">${item.template_name || '-'}</div>
                            <div class="small">邮箱: ${item.subscriber_email || '-'}</div>
                            <div class="small">下次发送: ${item.next_send_at || '-'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateTemplateSelects() {
            const reportSelect = document.getElementById('templateId');
            const subSelect = document.getElementById('subscriptionTemplateId');
            const options = ['<option value="">使用默认模板或选择现有模板</option>'].concat(
                templates.map(template => `<option value="${template.id}">${template.template_name}</option>`)
            ).join('');
            reportSelect.innerHTML = options;
            subSelect.innerHTML = templates.map(template => `<option value="${template.id}">${template.template_name}</option>`).join('');
        }

        function filterReports() {
            renderReports();
        }

        function showGenerateReportModal() {
            new bootstrap.Modal(document.getElementById('generateReportModal')).show();
        }

        function showCreateTemplateModal() {
            new bootstrap.Modal(document.getElementById('createTemplateModal')).show();
        }

        function showCreateSubscriptionModal() {
            new bootstrap.Modal(document.getElementById('createSubscriptionModal')).show();
        }

        async function generateReport() {
            const payload = {
                report_type: document.getElementById('reportType').value,
                template_id: document.getElementById('templateId').value || null,
                report_name: document.getElementById('reportName').value || null,
                parameters: {},
                generated_by: 'ui',
            };
            const portfolioId = document.getElementById('portfolioId').value.trim();
            if (portfolioId) {
                payload.parameters.portfolio_id = portfolioId;
            }
            const response = await fetch('/api/realtime-analysis/reports/generate-report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            });
            const result = await response.json();
            showAlert(result.success ? '报告生成成功' : `报告生成失败: ${result.message}`, result.success ? 'success' : 'danger');
            if (result.success) refreshData();
        }

        async function createTemplate() {
            const payload = {
                template_name: document.getElementById('templateName').value,
                template_type: document.getElementById('templateType').value,
                description: document.getElementById('templateDescription').value,
                created_by: 'ui',
            };
            const response = await fetch('/api/realtime-analysis/reports/templates', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            });
            const result = await response.json();
            showAlert(result.success ? '模板创建成功' : `模板创建失败: ${result.message}`, result.success ? 'success' : 'danger');
            if (result.success) refreshData();
        }

        async function createSubscription() {
            const payload = {
                subscription_name: document.getElementById('subscriptionName').value,
                template_id: document.getElementById('subscriptionTemplateId').value,
                subscriber_email: document.getElementById('subscriberEmail').value || null,
                schedule_type: 'daily',
                schedule_config: {"parameters": {}},
                notification_channels: Array.from(document.getElementById('notificationChannels').selectedOptions).map(option => option.value),
                created_by: 'ui',
            };
            const response = await fetch('/api/realtime-analysis/reports/subscriptions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            });
            const result = await response.json();
            showAlert(result.success ? '订阅创建成功' : `订阅创建失败: ${result.message}`, result.success ? 'success' : 'danger');
            if (result.success) refreshData();
        }

        async function dispatchSubscriptions() {
            const response = await fetch('/api/realtime-analysis/reports/subscriptions/dispatch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
            });
            const result = await response.json();
            showAlert(result.success ? `分发完成: 成功 ${result.dispatched}` : `分发失败: ${result.message}`, result.success ? 'success' : 'danger');
            if (result.success) refreshData();
        }

        function showAlert(message, type) {
            const div = document.createElement('div');
            div.className = `alert alert-${type} position-fixed`;
            div.style.cssText = 'top:20px;right:20px;z-index:9999;min-width:320px;';
            div.textContent = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }
    </script>
{% endblock %}
