{% extends "base.html" %}

{% block title %}报告管理 - 实时分析系统{% endblock %}

{% block extra_css %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .report-card, .template-card, .subscription-card {
            border-left: 4px solid var(--obs-primary);
            transition: transform 0.2s;
        }
        .template-card { border-left-color: var(--obs-success); }
        .subscription-card { border-left-color: var(--obs-warning); }
        .summary-card {
            min-height: 120px;
        }
        .json-block {
            white-space: pre-wrap;
            font-size: 12px;
            background: var(--obs-surface);
            border-radius: 6px;
            padding: 12px;
        }
        .report-section { padding: 8px 0 8px 12px; margin-bottom: 14px; }
        .report-section .section-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; }
        .metric-card { background: var(--obs-surface); border: none; border-radius: 8px; padding: 10px 8px; text-align: center; }
        .metric-card .metric-icon { font-size: 1.3rem; margin-bottom: 4px; }
        .metric-card .metric-value { font-size: 1.1rem; font-weight: 700; }
        .metric-card .metric-label { font-size: 0.72rem; color: var(--obs-text-muted); }
    </style>
{% endblock %}

{% block content %}
    <div class="container-fluid py-4">
        <div class="row mb-4">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1"><i class="bi bi-file-earmark-text"></i> 报告管理</h2>
                    <p class="text-muted mb-0">管理分析报告、模板和订阅</p>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" onclick="showGenerateReportModal()">
                        <i class="bi bi-plus-circle"></i> 生成报告
                    </button>
                    <button class="btn btn-outline-success" onclick="showCreateTemplateModal()">
                        <i class="bi bi-journal-plus"></i> 新建模板
                    </button>
                    <button class="btn btn-outline-warning" onclick="showCreateSubscriptionModal()">
                        <i class="bi bi-bell"></i> 新建订阅
                    </button>
                    <button class="btn btn-outline-secondary" onclick="refreshData()">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card summary-card bg-primary text-white">
                    <div class="card-body">
                        <div class="small">总报告数</div>
                        <div class="fs-3 fw-bold" id="totalReports">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card summary-card bg-success text-white">
                    <div class="card-body">
                        <div class="small">总模板数</div>
                        <div class="fs-3 fw-bold" id="totalTemplates">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card summary-card bg-warning text-dark">
                    <div class="card-body">
                        <div class="small">总订阅数</div>
                        <div class="fs-3 fw-bold" id="totalSubscriptions">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card summary-card bg-info text-white">
                    <div class="card-body">
                        <div class="small">成功率</div>
                        <div class="fs-3 fw-bold" id="successRate">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-pills mb-4" id="reportTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#reports" type="button">报告列表</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#templates" type="button">模板管理</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#subscriptions" type="button">订阅管理</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#statistics" type="button">统计分析</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="reports" role="tabpanel">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>报告列表</span>
                        <select class="form-select form-select-sm w-auto" id="reportTypeFilter" onchange="filterReports()">
                            <option value="">所有类型</option>
                            <option value="daily_summary">每日市场总结</option>
                            <option value="portfolio_analysis">投资组合分析</option>
                            <option value="risk_assessment">风险评估报告</option>
                            <option value="signal_analysis">交易信号分析</option>
                            <option value="market_overview">市场概览报告</option>
                        </select>
                    </div>
                    <div class="card-body">
                        <div id="reportsContainer" class="row"></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="templates" role="tabpanel">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>模板管理</span>
                        <button class="btn btn-sm btn-outline-success" onclick="showCreateTemplateModal()">新增模板</button>
                    </div>
                    <div class="card-body">
                        <div id="templatesContainer" class="row"></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="subscriptions" role="tabpanel">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>订阅管理</span>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-warning" onclick="showCreateSubscriptionModal()">新增订阅</button>
                            <button class="btn btn-sm btn-outline-primary" onclick="dispatchSubscriptions()">立即分发</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="subscriptionsContainer" class="row"></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="statistics" role="tabpanel">
                <div class="card">
                    <div class="card-header">统计分析</div>
                    <div class="card-body">
                        <div id="statisticsContainer" class="json-block">暂无统计数据</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="generateReportModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">生成报告</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="generateReportForm">
                        <div class="mb-3">
                            <label class="form-label">报告类型</label>
                            <select class="form-select" id="reportType" required>
                                <option value="">请选择报告类型</option>
                                <option value="daily_summary">每日市场总结</option>
                                <option value="portfolio_analysis">投资组合分析</option>
                                <option value="risk_assessment">风险评估报告</option>
                                <option value="signal_analysis">交易信号分析</option>
                                <option value="market_overview">市场概览报告</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">报告名称</label>
                            <input type="text" class="form-control" id="reportName" placeholder="留空则自动生成报告名称">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">模板</label>
                            <select class="form-select" id="templateId">
                                <option value="">使用默认模板或选择现有模板</option>
                            </select>
                        </div>
                        <div class="mb-3" id="portfolioIdGroup" style="display: none;">
                            <label class="form-label">投资组合</label>
                            <select class="form-select" id="portfolioId">
                                <option value="">请选择投资组合</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="generateReport()">生成报告</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createTemplateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新建模板</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">模板名称</label>
                        <input type="text" class="form-control" id="templateName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">模板类型</label>
                        <select class="form-select" id="templateType">
                            <option value="daily_summary">每日市场总结</option>
                            <option value="portfolio_analysis">投资组合分析</option>
                            <option value="risk_assessment">风险评估报告</option>
                            <option value="signal_analysis">交易信号分析</option>
                            <option value="market_overview">市场概览报告</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="templateDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="createTemplate()">创建模板</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createSubscriptionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新建订阅</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">订阅名称</label>
                        <input type="text" class="form-control" id="subscriptionName" placeholder="订阅名称">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">模板</label>
                        <select class="form-select" id="subscriptionTemplateId"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="subscriberEmail">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">通知渠道</label>
                        <select class="form-select" id="notificationChannels" multiple>
                            <option value="email">email</option>
                            <option value="log" selected>log</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-warning" onclick="createSubscription()">创建订阅</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let reports = [];
        let templates = [];
        let subscriptions = [];

        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            refreshData();
        });

        function setupEventListeners() {
            document.getElementById('reportType').addEventListener('change', function() {
                const portfolioGroup = document.getElementById('portfolioIdGroup');
                const show = ['portfolio_analysis', 'risk_assessment'].includes(this.value);
                portfolioGroup.style.display = show ? 'block' : 'none';
                if (show) loadPortfolioOptions();
            });
        }

        async function loadPortfolioOptions() {
            const select = document.getElementById('portfolioId');
            if (select.options.length > 1) return; // 已加载过
            try {
                const response = await fetch('/api/ml-factor/portfolio/list');
                const result = await response.json();
                if (result.success && result.portfolios) {
                    select.innerHTML = '<option value="">请选择投资组合</option>';
                    result.portfolios.forEach(p => {
                        const option = document.createElement('option');
                        option.value = p.portfolio_id;
                        option.textContent = `${p.name || p.portfolio_id} (${p.position_count || 0}只)`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载组合列表失败:', error);
            }
        }

        async function refreshData() {
            await Promise.all([loadReports(), loadTemplates(), loadSubscriptions(), loadStatistics()]);
        }

        async function loadReports() {
            const response = await fetch('/api/realtime-analysis/reports/reports');
            const result = await response.json();
            reports = result.success ? (result.data || []) : [];
            renderReports();
        }

        async function loadTemplates() {
            const response = await fetch('/api/realtime-analysis/reports/templates');
            const result = await response.json();
            templates = result.success ? (result.data || []) : [];
            renderTemplates();
            updateTemplateSelects();
        }

        async function loadSubscriptions() {
            const response = await fetch('/api/realtime-analysis/reports/subscriptions');
            const result = await response.json();
            subscriptions = result.success ? (result.data || []) : [];
            renderSubscriptions();
        }

        async function loadStatistics() {
            const response = await fetch('/api/realtime-analysis/reports/statistics');
            const result = await response.json();
            const stats = result.success ? (result.data || {}) : {};
            document.getElementById('totalReports').textContent = stats.reports ? stats.reports.total : 0;
            document.getElementById('totalTemplates').textContent = stats.templates ? stats.templates.total : 0;
            document.getElementById('totalSubscriptions').textContent = stats.subscriptions ? stats.subscriptions.total : 0;
            document.getElementById('successRate').textContent = stats.reports ? `${(stats.reports.success_rate || 0).toFixed(1)}%` : '0%';
            document.getElementById('statisticsContainer').textContent = JSON.stringify(stats, null, 2);
            renderStatistics(stats);
        }

        function renderStatistics(stats) {
            const container = document.getElementById('statisticsContainer');
            const r = stats.reports || {};
            const t = stats.templates || {};
            const s = stats.subscriptions || {};
            const typeStats = stats.report_type_stats || {};

            const typeLabels = {
                daily_summary: '每日总结', portfolio_analysis: '组合分析',
                risk_assessment: '风险评估', signal_analysis: '信号分析',
                market_overview: '市场概览', custom: '自定义'
            };

            container.innerHTML = `
                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="card" style="border-left:4px solid var(--bs-primary);">
                            <div class="card-body">
                                <h6 class="card-title"><i class="bi bi-file-earmark-text me-1"></i>报告统计</h6>
                                <div class="d-flex justify-content-between mb-1"><span>总报告数</span><strong>${r.total || 0}</strong></div>
                                <div class="d-flex justify-content-between mb-1"><span>已完成</span><strong class="text-success">${r.completed || 0}</strong></div>
                                <div class="d-flex justify-content-between mb-1"><span>失败</span><strong class="text-danger">${r.failed || 0}</strong></div>
                                <div class="d-flex justify-content-between"><span>成功率</span><strong>${(r.success_rate || 0).toFixed(1)}%</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card" style="border-left:4px solid var(--bs-success);">
                            <div class="card-body">
                                <h6 class="card-title"><i class="bi bi-journal-plus me-1"></i>模板统计</h6>
                                <div class="d-flex justify-content-between mb-1"><span>总模板数</span><strong>${t.total || 0}</strong></div>
                                <div class="d-flex justify-content-between"><span>活跃模板</span><strong class="text-success">${t.active || 0}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card" style="border-left:4px solid var(--bs-warning);">
                            <div class="card-body">
                                <h6 class="card-title"><i class="bi bi-bell me-1"></i>订阅统计</h6>
                                <div class="d-flex justify-content-between mb-1"><span>总订阅数</span><strong>${s.total || 0}</strong></div>
                                <div class="d-flex justify-content-between"><span>活跃订阅</span><strong class="text-warning">${s.active || 0}</strong></div>
                            </div>
                        </div>
                    </div>
                </div>
                ${Object.keys(typeStats).length ? `
                <div class="card mt-3">
                    <div class="card-body">
                        <h6 class="card-title mb-3"><i class="bi bi-pie-chart me-1"></i>报告类型分布</h6>
                        <div class="row g-2">
                            ${Object.entries(typeStats).map(([k, v]) => `
                                <div class="col-6 col-md-4 col-lg-2">
                                    <div class="text-center p-2 rounded" style="background:var(--obs-surface);">
                                        <div class="fw-bold fs-5">${v}</div>
                                        <div class="small text-muted">${typeLabels[k] || k}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                ` : ''}
            `;
        }

        function renderReports() {
            const filter = document.getElementById('reportTypeFilter').value;
            const visibleReports = filter ? reports.filter(item => item.report_type === filter) : reports;
            const container = document.getElementById('reportsContainer');
            if (!visibleReports.length) {
                container.innerHTML = '<div class="col-12 text-muted">暂无报告数据</div>';
                return;
            }
            container.innerHTML = visibleReports.map(report => {
                const statusClass = report.report_status === 'completed' ? 'success' :
                                    report.report_status === 'failed' ? 'danger' : 'warning';
                return `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card report-card" style="cursor:pointer" onclick="toggleReportDetail(${report.id})">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div class="fw-bold">${report.report_name}</div>
                                <span class="badge bg-${statusClass}">${report.report_status || '-'}</span>
                            </div>
                            <div class="small text-muted mb-1">${report.report_type}</div>
                            <div class="small text-muted">${report.generated_at || '-'}</div>
                        </div>
                        <div class="card-body border-top d-none" id="report-detail-${report.id}" style="max-height:600px;overflow-y:auto;padding:16px;">
                            ${renderReportContent(report)}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleReportDetail(reportId) {
            const el = document.getElementById(`report-detail-${reportId}`);
            if (el) {
                el.classList.toggle('d-none');
                if (!el.classList.contains('d-none')) {
                    setTimeout(() => initSectionCharts(reportId), 80);
                }
            }
        }

        function initSectionCharts(reportId) {
            const detail = document.getElementById(`report-detail-${reportId}`);
            if (!detail) return;
            const chartDivs = detail.querySelectorAll('[id^="report-chart-"]');
            chartDivs.forEach(div => {
                if (div._chartInit) return;
                div._chartInit = true;
                const idx = parseInt(div.id.replace('report-chart-', ''));
                const report = reports.find(r => r.id === reportId);
                if (!report || !report.report_content || !report.report_content.sections) return;
                const section = report.report_content.sections[idx];
                if (!section || !section.content) return;
                try {
                    const chart = echarts.init(div);
                    const cd = section.content;
                    let option;
                    if (cd.chart_type === 'pie') {
                        option = {
                            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                            series: [{ type: 'pie', radius: ['35%', '65%'], label: { fontSize: 11 }, data: cd.data || [] }]
                        };
                    } else {
                        option = {
                            tooltip: { trigger: 'axis' },
                            xAxis: { type: 'category', data: (cd.data || []).map(d => d.name), axisLabel: { fontSize: 10 } },
                            yAxis: { type: 'value', axisLabel: { fontSize: 10 } },
                            series: [{ type: 'bar', data: (cd.data || []).map(d => d.value), itemStyle: { borderRadius: [4,4,0,0] } }]
                        };
                    }
                    chart.setOption(option);
                } catch (e) { console.warn('Chart init failed:', e); }
            });
        }

        // ---- Formatting utilities ----
        function fmtValue(value, format) {
            if (value === null || value === undefined) return '--';
            if (format === 'currency') return '¥' + Number(value).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
            if (format === 'percent') return Number(value).toFixed(1) + '%';
            if (format === 'pnl') {
                const n = Number(value);
                return (n >= 0 ? '+' : '') + n.toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
            }
            if (format === 'number') return Number(value).toLocaleString('zh-CN');
            if (format === 'text') return String(value);
            return String(value);
        }
        function cellCls(value, format) {
            if (format === 'pnl') { const n = Number(value); return n > 0 ? 'text-success' : n < 0 ? 'text-danger' : ''; }
            return '';
        }

        // ---- Section renderers ----
        const sectionRenderers = {
            summary(content) {
                if (typeof content === 'string') return `<div class="small text-muted">${content}</div>`;
                return `<div class="json-block small">${JSON.stringify(content, null, 2)}</div>`;
            },
            metrics(content) {
                if (!Array.isArray(content)) return sectionRenderers.summary(content);
                return '<div class="row g-2">' + content.map(m => {
                    const val = fmtValue(m.value, m.format);
                    return `<div class="col-6 col-md-3">
                        <div class="metric-card">
                            <div class="metric-icon" style="color:var(--bs-${m.color || 'primary'})"><i class="bi ${m.icon || 'bi-hash'}"></i></div>
                            <div class="metric-value">${val}</div>
                            <div class="metric-label">${m.label}</div>
                        </div>
                    </div>`;
                }).join('') + '</div>';
            },
            table(content) {
                let headers, keys, formats = {};
                let rows;
                if (Array.isArray(content)) {
                    if (!content.length) return '<div class="text-muted small">暂无数据</div>';
                    keys = Object.keys(content[0]);
                    headers = keys;
                    rows = content;
                } else if (content && content.columns && content.rows) {
                    headers = content.columns.map(c => c.label);
                    keys = content.columns.map(c => c.key);
                    content.columns.forEach(c => { if (c.format) formats[c.key] = c.format; });
                    rows = content.rows;
                } else {
                    return `<div class="json-block small">${JSON.stringify(content, null, 2)}</div>`;
                }
                if (!rows || !rows.length) return '<div class="text-muted small">暂无数据</div>';
                return `<div class="table-responsive" style="max-height:220px;overflow-y:auto;">
                    <table class="table table-sm table-hover" style="font-size:0.78rem;">
                    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                    <tbody>${rows.map(row => '<tr>' + keys.map(k => {
                        const fmt = formats[k];
                        return `<td class="${cellCls(row[k], fmt)}">${fmtValue(row[k], fmt)}</td>`;
                    }).join('') + '</tr>').join('')}</tbody>
                    </table></div>`;
            },
            chart(content, idx) {
                return `<div id="report-chart-${idx}" style="width:100%;height:260px;"></div>`;
            },
            alerts(content) {
                let items, sevField = 'alert_level';
                if (Array.isArray(content)) { items = content; }
                else if (content && content.items) { items = content.items; sevField = content.severity_field || 'alert_level'; }
                else { return `<div class="json-block small">${JSON.stringify(content, null, 2)}</div>`; }
                if (!items || !items.length) return '<div class="text-muted small">暂无预警</div>';
                const colorMap = { high: 'danger', medium: 'warning', low: 'success' };
                return items.map(a => {
                    const level = (a[sevField] || 'low').toLowerCase();
                    const c = colorMap[level] || 'secondary';
                    return `<div style="border-left:3px solid var(--bs-${c});background:var(--bs-${c}-bg,transparent);padding:6px 10px;margin-bottom:5px;border-radius:4px;font-size:0.8rem;">
                        <strong>${a.ts_code || ''}</strong> - ${a.alert_type || a.alert_message || ''}
                        ${a.alert_message && a.alert_type ? `<div class="text-muted mt-1">${a.alert_message}</div>` : ''}
                    </div>`;
                }).join('');
            },
            error(content) {
                return `<div class="alert alert-danger py-2" style="font-size:0.85rem;"><i class="bi bi-exclamation-triangle me-1"></i>${content}</div>`;
            },
        };
        const sectionIcons = { summary:'bi-file-text', table:'bi-table', chart:'bi-bar-chart', alerts:'bi-bell', metrics:'bi-speedometer2', error:'bi-exclamation-triangle' };
        const sectionColors = { summary:'primary', table:'info', chart:'success', alerts:'warning', metrics:'primary', error:'danger' };

        function renderReportContent(report) {
            const content = report.report_content || {};
            const sections = content.sections || [];
            if (!sections.length) return '<div class="text-muted small">无报告内容</div>';
            return sections.map((section, idx) => {
                const renderer = sectionRenderers[section.type] || sectionRenderers.summary;
                const icon = sectionIcons[section.type] || 'bi-file-text';
                const color = sectionColors[section.type] || 'secondary';
                const body = renderer(section.content, idx);
                return `<div class="report-section" style="border-left:3px solid var(--bs-${color});">
                    <div class="fw-bold small mb-2"><i class="bi ${icon} me-1"></i>${section.title || ''}</div>
                    ${body}
                </div>`;
            }).join('');
        }

        function renderTemplates() {
            const container = document.getElementById('templatesContainer');
            if (!templates.length) {
                container.innerHTML = '<div class="col-12 text-muted">暂无模板数据</div>';
                return;
            }
            container.innerHTML = templates.map(template => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card template-card">
                        <div class="card-body">
                            <div class="fw-bold">${template.template_name}</div>
                            <div class="small text-muted mb-2">${template.template_type}</div>
                            <div class="small">${template.description || '无描述'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderSubscriptions() {
            const container = document.getElementById('subscriptionsContainer');
            if (!subscriptions.length) {
                container.innerHTML = '<div class="col-12 text-muted">暂无订阅数据</div>';
                return;
            }
            container.innerHTML = subscriptions.map(item => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card subscription-card">
                        <div class="card-body">
                            <div class="fw-bold">${item.subscription_name}</div>
                            <div class="small text-muted mb-2">${item.template_name || '-'}</div>
                            <div class="small">邮箱: ${item.subscriber_email || '-'}</div>
                            <div class="small">下次发送: ${item.next_send_at || '-'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateTemplateSelects() {
            const reportSelect = document.getElementById('templateId');
            const subSelect = document.getElementById('subscriptionTemplateId');
            const options = ['<option value="">使用默认模板或选择现有模板</option>'].concat(
                templates.map(template => `<option value="${template.id}">${template.template_name}</option>`)
            ).join('');
            reportSelect.innerHTML = options;
            subSelect.innerHTML = templates.map(template => `<option value="${template.id}">${template.template_name}</option>`).join('');
        }

        function filterReports() {
            renderReports();
        }

        function showGenerateReportModal() {
            new bootstrap.Modal(document.getElementById('generateReportModal')).show();
        }

        function showCreateTemplateModal() {
            new bootstrap.Modal(document.getElementById('createTemplateModal')).show();
        }

        function showCreateSubscriptionModal() {
            new bootstrap.Modal(document.getElementById('createSubscriptionModal')).show();
        }

        async function generateReport() {
            const payload = {
                report_type: document.getElementById('reportType').value,
                template_id: document.getElementById('templateId').value || null,
                report_name: document.getElementById('reportName').value || null,
                parameters: {},
                generated_by: 'ui',
            };
            const portfolioId = document.getElementById('portfolioId').value;
            if (portfolioId) {
                payload.parameters.portfolio_id = portfolioId;
            }
            const response = await fetch('/api/realtime-analysis/reports/generate-report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            });
            const result = await response.json();
            showAlert(result.success ? '报告生成成功' : `报告生成失败: ${result.message}`, result.success ? 'success' : 'danger');
            if (result.success) refreshData();
        }

        async function createTemplate() {
            const payload = {
                template_name: document.getElementById('templateName').value,
                template_type: document.getElementById('templateType').value,
                description: document.getElementById('templateDescription').value,
                created_by: 'ui',
            };
            const response = await fetch('/api/realtime-analysis/reports/templates', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            });
            const result = await response.json();
            showAlert(result.success ? '模板创建成功' : `模板创建失败: ${result.message}`, result.success ? 'success' : 'danger');
            if (result.success) refreshData();
        }

        async function createSubscription() {
            const payload = {
                subscription_name: document.getElementById('subscriptionName').value,
                template_id: document.getElementById('subscriptionTemplateId').value,
                subscriber_email: document.getElementById('subscriberEmail').value || null,
                schedule_type: 'daily',
                schedule_config: {"parameters": {}},
                notification_channels: Array.from(document.getElementById('notificationChannels').selectedOptions).map(option => option.value),
                created_by: 'ui',
            };
            const response = await fetch('/api/realtime-analysis/reports/subscriptions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            });
            const result = await response.json();
            showAlert(result.success ? '订阅创建成功' : `订阅创建失败: ${result.message}`, result.success ? 'success' : 'danger');
            if (result.success) refreshData();
        }

        async function dispatchSubscriptions() {
            const response = await fetch('/api/realtime-analysis/reports/subscriptions/dispatch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
            });
            const result = await response.json();
            showAlert(result.success ? `分发完成: 成功 ${result.dispatched}` : `分发失败: ${result.message}`, result.success ? 'success' : 'danger');
            if (result.success) refreshData();
        }

        function showAlert(message, type) {
            const div = document.createElement('div');
            div.className = `alert alert-${type} position-fixed`;
            div.style.cssText = 'top:20px;right:20px;z-index:9999;min-width:320px;';
            div.textContent = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }
    </script>
{% endblock %}
