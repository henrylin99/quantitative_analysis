{% block extra_js %}
<script>
let portfolios = [];

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    loadPortfolios();
});

// 加载投资组合列表
async function loadPortfolios() {
    try {
        const response = await axios.get('/api/ml-factor/portfolio/list');
        portfolios = response.data.portfolios || [];
        renderPortfolios();
    } catch (error) {
        console.error('加载投资组合失败:', error);
        showError('portfolioList', '加载投资组合失败');
    }
}

// 优化投资组合
async function optimizePortfolio() {
    const method = document.getElementById('optimizationMethod').value;
    const riskLevel = document.getElementById('riskLevel').value;
    const maxStocks = parseInt(document.getElementById('maxStocks').value);
    
    // 显示加载状态
    const button = document.querySelector('button[onclick="optimizePortfolio()"]');
    const originalText = button.innerHTML;
    button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 优化中...';
    button.disabled = true;
    
    try {
        // 根据风险水平设置优化参数
        const riskParams = getRiskParameters(riskLevel);
        const tradeDate = new Date().toISOString().split('T')[0];
        
        const response = await axios.post('/api/ml-factor/portfolio/integrated-selection', {
            trade_date: tradeDate,
            selection_method: 'factor_based',
            factor_list: ['momentum_5d', 'pe_percentile', 'money_flow_strength'],
            weights: {'momentum_5d': 0.4, 'pe_percentile': 0.3, 'money_flow_strength': 0.3},
            top_n: Math.max(maxStocks * 2, 20),
            optimization_method: method,
            constraints: {
                max_weight: riskParams.max_weight,
                min_weight: riskParams.min_weight,
                max_stocks: maxStocks,
                target_return: riskParams.target_return,
                risk_tolerance: riskParams.risk_tolerance
            }
        });
        
        if (response.data.success) {
            // 显示优化结果
            const effectiveMethod = response.data.portfolio_optimization?.method || method;
            showOptimizationResults(response.data.portfolio_optimization, effectiveMethod, riskLevel, maxStocks, response.data);
        } else {
            throw new Error('所有优化方法都失败了: ' + (response.data.error || '未知错误'));
        }
        
    } catch (error) {
        console.error('投资组合优化失败:', error);
        alert('投资组合优化失败: ' + error.message + '\n\n请检查是否有足够的因子数据，或尝试减少最大持股数。');
    } finally {
        // 恢复按钮状态
        button.innerHTML = originalText;
        button.disabled = false;
    }
}

// 根据风险水平获取参数
function getRiskParameters(riskLevel) {
    const params = {
        'conservative': {
            max_weight: 0.08,      // 单只股票最大权重8%
            min_weight: 0.02,      // 单只股票最小权重2%
            target_return: 0.08,   // 目标年化收益率8%
            risk_tolerance: 0.12   // 风险容忍度12%
        },
        'moderate': {
            max_weight: 0.12,      // 单只股票最大权重12%
            min_weight: 0.01,      // 单只股票最小权重1%
            target_return: 0.12,   // 目标年化收益率12%
            risk_tolerance: 0.18   // 风险容忍度18%
        },
        'aggressive': {
            max_weight: 0.20,      // 单只股票最大权重20%
            min_weight: 0.005,     // 单只股票最小权重0.5%
            target_return: 0.18,   // 目标年化收益率18%
            risk_tolerance: 0.25   // 风险容忍度25%
        }
    };
    
    return params[riskLevel] || params['moderate'];
}

// 获取方法标签
function getMethodLabel(method) {
    const labels = {
        'mean_variance': '均值方差优化',
        'risk_parity': '风险平价',
        'equal_weight': '等权重',
        'factor_neutral': '因子中性优化'
    };
    return labels[method] || method;
}

// 获取风险标签
function getRiskLabel(riskLevel) {
    const labels = {
        'conservative': '保守型',
        'moderate': '稳健型',
        'aggressive': '积极型'
    };
    return labels[riskLevel] || riskLevel;
}

// 获取权重徽章颜色
function getWeightBadgeColor(rank) {
    if (rank <= 3) return 'success';
    if (rank <= 10) return 'primary';
    if (rank <= 20) return 'warning';
    return 'secondary';
}

// 获取权重进度条颜色
function getWeightProgressColor(weight) {
    if (weight >= 0.15) return 'danger';
    if (weight >= 0.10) return 'warning';
    if (weight >= 0.05) return 'primary';
    return 'success';
}

// 计算权重标准差
function calculateWeightStd(weights) {
    const values = Object.values(weights);
    const mean = values.reduce((sum, w) => sum + w, 0) / values.length;
    const variance = values.reduce((sum, w) => sum + Math.pow(w - mean, 2), 0) / values.length;
    return Math.sqrt(variance);
}

// 计算有效股票数
function calculateEffectiveStocks(weights) {
    const sumSquaredWeights = Object.values(weights).reduce((sum, w) => sum + w * w, 0);
    return 1 / sumSquaredWeights;
}

async function saveOptimizedPortfolio() {
    if (!window.currentOptimizationResult) {
        alert('没有优化结果可保存');
        return;
    }

    const portfolioId = prompt(
        '请输入投资组合ID:',
        `portfolio_${new Date().toISOString().split('T')[0].replace(/-/g, '')}`
    );

    if (!portfolioId) {
        return;
    }

    try {
        const response = await axios.post('/api/ml-factor/portfolio/save-optimized', {
            portfolio_id: portfolioId,
            total_capital: 1000000,
            weights: window.currentOptimizationResult.weights,
        });

        if (response.data.success) {
            alert(`投资组合保存成功: ${portfolioId}`);
            bootstrap.Modal.getInstance(document.getElementById('optimizationResultModal')).hide();
            await loadPortfolios();
            return;
        }

        throw new Error(response.data.error || '保存投资组合失败');
    } catch (error) {
        console.error('保存投资组合失败:', error);
        alert('保存投资组合失败: ' + (error.response?.data?.error || error.message));
    }
}

// 导出优化结果
function exportOptimizationResults() {
    if (!window.currentOptimizationResult) {
        alert('没有优化结果可导出');
        return;
    }
    
    const result = window.currentOptimizationResult;
    
    // 创建CSV内容
    const headers = ['股票代码', '权重(%)', '权重(小数)', '排名'];
    const csvContent = [
        `# 投资组合优化结果`,
        `# 优化方法: ${getMethodLabel(result.method)}`,
        `# 风险水平: ${getRiskLabel(result.riskLevel)}`,
        `# 预期收益率: ${formatPercent(result.stats.expected_return || 0)}`,
        `# 组合波动率: ${formatPercent(result.stats.volatility || 0)}`,
        `# 夏普比率: ${(result.stats.sharpe_ratio || 0).toFixed(2)}`,
        `# 生成时间: ${new Date().toLocaleString()}`,
        '',
        headers.join(','),
        ...Object.entries(result.weights)
            .sort(([,a], [,b]) => b - a)
            .map(([ts_code, weight], index) => [
                ts_code,
                (weight * 100).toFixed(2),
                weight.toFixed(6),
                index + 1
            ].join(','))
    ].join('\n');
    
    // 创建下载链接
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', `投资组合优化结果_${result.method}_${new Date().toISOString().split('T')[0]}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

                                        <td><code>${position.ts_code}</code></td>
                                        <td>${formatPercent((position.weight || 0) / 100)}</td>
                                        <td>${formatAmount(position.market_value || 0)}</td>
                                        <td>${formatAmount(position.unrealized_pnl || 0)}</td>
                                        <td>
                                            <button class="btn btn-sm btn-outline-danger" onclick="deletePortfolioPosition('${portfolio.portfolio_id}', ${position.id})">
                                                <i class="fas fa-trash"></i> 删除
                                            </button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                ` : '<p class="text-muted">暂无持仓</p>'}
            </div>
        </div>
    `;

        document.getElementById('portfolioDetailContent').innerHTML = detailHtml;
        new bootstrap.Modal(document.getElementById('portfolioDetailModal')).show();
    } catch (error) {
        console.error('加载投资组合详情失败:', error);
        alert('加载投资组合详情失败: ' + (error.response?.data?.error || error.message));
    }
}

async function deletePortfolio(portfolioId) {
    if (!confirm(`确定要删除投资组合吗？\n组合: ${portfolioId}\n该操作会将该组合下所有持仓标记为非活跃。`)) {
        return;
    }

    try {
        const response = await axios.delete(`/api/ml-factor/portfolio/${portfolioId}`);
        if (response.data.success) {
            alert(`投资组合删除成功: ${portfolioId}`);
            await loadPortfolios();
            return;
        }

        throw new Error(response.data.error || '删除投资组合失败');
    } catch (error) {
        console.error('删除投资组合失败:', error);
        alert('删除投资组合失败: ' + (error.response?.data?.error || error.message));
    }
}

async function deletePortfolioPosition(portfolioId, positionId) {
    if (!confirm(`确定要删除该持仓吗？\n组合: ${portfolioId}\n持仓ID: ${positionId}`)) {
        return;
    }

    try {
        const response = await axios.delete(
            `/api/realtime-analysis/risk/portfolio/${portfolioId}/positions/${positionId}`
        );
        if (response.data.success) {
            alert(`持仓删除成功: ${positionId}`);
            await loadPortfolios();
            await viewPortfolioDetail(portfolioId);
            return;
        }

        throw new Error(response.data.message || '删除持仓失败');
    } catch (error) {
        console.error('删除持仓失败:', error);
        alert('删除持仓失败: ' + (error.response?.data?.message || error.message));
    }
}

// 格式化金额
function formatAmount(amount) {
    if (amount >= 100000000) {
        return (amount / 100000000).toFixed(2) + '亿';
    } else if (amount >= 10000) {
        return (amount / 10000).toFixed(2) + '万';
    }
    return amount.toFixed(2);
}

// 格式化百分比
function formatPercent(value) {
    return (value * 100).toFixed(2) + '%';
}

// 显示错误信息
function showError(elementId, message) {
    const element = document.getElementById(elementId);
    if (element) {
        element.innerHTML = `<div class="alert alert-danger">${message}</div>`;
    }
}

</script>
{% endblock %}
