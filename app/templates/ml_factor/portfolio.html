{% extends "base.html" %}

{% block title %}投资组合 - 多因子模型系统{% endblock %}

{% block content %}
<div class="container">
    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1>💼 投资组合</h1>
                    <p class="text-muted">当前页面提供最小真实组合闭环，再平衡入口暂未开放。</p>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createPortfolioModal">
                    <i class="fas fa-plus"></i> 创建组合
                </button>
            </div>
        </div>
    </div>

    <!-- 组合优化工具 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">组合优化工具</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="optimizationMethod" class="form-label">优化方法</label>
                            <select class="form-select" id="optimizationMethod">
                                <option value="mean_variance">均值方差优化</option>
                                <option value="risk_parity">风险平价</option>
                                <option value="equal_weight">等权重</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="riskLevel" class="form-label">风险水平</label>
                            <select class="form-select" id="riskLevel">
                                <option value="conservative">保守型</option>
                                <option value="moderate">稳健型</option>
                                <option value="aggressive">积极型</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="maxStocks" class="form-label">最大持股数</label>
                            <input type="number" class="form-control" id="maxStocks" value="20" min="5" max="50">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">&nbsp;</label>
                            <div>
                                <button class="btn btn-success" onclick="optimizePortfolio()">
                                    <i class="fas fa-chart-line"></i> 优化组合
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 组合列表 -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">我的投资组合</h5>
                </div>
                <div class="card-body">
                    <div id="portfolioList">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 创建组合模态框 -->
<div class="modal fade" id="createPortfolioModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">创建真实投资组合</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createPortfolioForm">
                    <div class="mb-3">
                        <label for="portfolioId" class="form-label">组合ID *</label>
                        <input type="text" class="form-control" id="portfolioId" placeholder="例如 growth_a" required>
                    </div>
                    <div class="mb-3">
                        <label for="portfolioTsCode" class="form-label">首个持仓股票代码 *</label>
                        <input type="text" class="form-control" id="portfolioTsCode" placeholder="例如 000001.SZ" required>
                    </div>
                    <div class="mb-3">
                        <label for="portfolioPositionSize" class="form-label">持仓数量 *</label>
                        <input type="number" class="form-control" id="portfolioPositionSize" value="1000" min="1" step="1" required>
                    </div>
                    <div class="mb-3">
                        <label for="portfolioAvgCost" class="form-label">平均成本 *</label>
                        <input type="number" class="form-control" id="portfolioAvgCost" value="10" min="0.01" step="0.01" required>
                    </div>
                    <div class="mb-0">
                        <label for="portfolioSector" class="form-label">行业</label>
                        <input type="text" class="form-control" id="portfolioSector" placeholder="例如 银行">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="createPortfolio()">创建组合</button>
            </div>
        </div>
    </div>
</div>

<!-- 组合详情模态框 -->
<div class="modal fade" id="portfolioDetailModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="portfolioDetailTitle">组合详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="portfolioDetailContent">
                    <!-- 组合详情内容 -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 再平衡预览模态框 -->
<div class="modal fade" id="rebalancePreviewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">再平衡预览</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="rebalancePreviewContent">
                    <div class="text-muted">暂无再平衡结果</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 持仓编辑模态框 -->
<div class="modal fade" id="portfolioPositionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="portfolioPositionModalTitle">新增持仓</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="portfolioPositionForm">
                    <div class="mb-3">
                        <label for="positionTsCode" class="form-label">股票代码 *</label>
                        <input type="text" class="form-control" id="positionTsCode" placeholder="例如 000001.SZ" required>
                    </div>
                    <div class="mb-3">
                        <label for="positionSizeInput" class="form-label">持仓数量 *</label>
                        <input type="number" class="form-control" id="positionSizeInput" min="1" step="1" required>
                    </div>
                    <div class="mb-3">
                        <label for="positionAvgCostInput" class="form-label">平均成本 *</label>
                        <input type="number" class="form-control" id="positionAvgCostInput" min="0.01" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label for="positionCurrentPriceInput" class="form-label">当前价格</label>
                        <input type="number" class="form-control" id="positionCurrentPriceInput" min="0.01" step="0.01">
                        <div class="form-text">仅编辑持仓时可修改，新增持仓默认按成本价初始化。</div>
                    </div>
                    <div class="mb-3">
                        <label for="positionSectorInput" class="form-label">行业</label>
                        <input type="text" class="form-control" id="positionSectorInput" placeholder="例如 银行">
                    </div>
                    <div class="mb-3">
                        <label for="positionStopLossInput" class="form-label">止损价</label>
                        <input type="number" class="form-control" id="positionStopLossInput" min="0.01" step="0.01">
                    </div>
                    <div class="mb-0">
                        <label for="positionTakeProfitInput" class="form-label">止盈价</label>
                        <input type="number" class="form-control" id="positionTakeProfitInput" min="0.01" step="0.01">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="portfolioPositionSubmitButton" onclick="submitPortfolioPosition()">保存持仓</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let portfolios = [];
let currentPortfolioId = null;
let editingPositionId = null;

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    loadPortfolios();
});

async function createPortfolio() {
    const portfolioId = document.getElementById('portfolioId').value.trim();
    const tsCode = document.getElementById('portfolioTsCode').value.trim();
    const positionSize = parseFloat(document.getElementById('portfolioPositionSize').value);
    const avgCost = parseFloat(document.getElementById('portfolioAvgCost').value);
    const sector = document.getElementById('portfolioSector').value.trim();

    if (!portfolioId || !tsCode || !positionSize || !avgCost) {
        alert('请填写所有必填字段');
        return;
    }

    try {
        const response = await axios.post('/api/realtime-analysis/risk/portfolio', {
            portfolio_id: portfolioId,
            ts_code: tsCode,
            position_size: positionSize,
            avg_cost: avgCost,
            sector: sector || null,
        });

        if (response.data.success) {
            alert(`投资组合创建成功: ${portfolioId}`);
            bootstrap.Modal.getInstance(document.getElementById('createPortfolioModal')).hide();
            document.getElementById('createPortfolioForm').reset();
            await loadPortfolios();
            await viewPortfolioDetail(portfolioId);
            return;
        }

        throw new Error(response.data.message || '创建投资组合失败');
    } catch (error) {
        console.error('创建投资组合失败:', error);
        alert('创建投资组合失败: ' + (error.response?.data?.message || error.message));
    }
}

// 加载投资组合列表
async function loadPortfolios() {
    try {
        const response = await axios.get('/api/ml-factor/portfolio/list');
        portfolios = response.data.portfolios || [];
        renderPortfolios();
    } catch (error) {
        console.error('加载投资组合失败:', error);
        showError('portfolioList', '加载投资组合失败');
    }
}

// 渲染投资组合列表
function renderPortfolios() {
    const container = document.getElementById('portfolioList');
    
    if (portfolios.length === 0) {
        container.innerHTML = '<div class="alert alert-info mb-0">暂无真实投资组合，请先创建组合或保存优化结果。</div>';
        return;
    }
    
    const html = portfolios.map(portfolio => `
        <div class="card mb-3">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <h5 class="card-title">
                            ${portfolio.name}
                            <span class="badge bg-${portfolio.status === 'active' ? 'success' : 'secondary'} ms-2">
                                ${portfolio.status === 'active' ? '活跃' : '非活跃'}
                            </span>
                        </h5>
                        <p class="card-text text-muted">${portfolio.description}</p>
                        <div class="row">
                            <div class="col-md-3">
                                <small class="text-muted">当前价值</small>
                                <div class="fw-bold">
                                    ${formatAmount(portfolio.current_value)}
                                </div>
                            </div>
                            <div class="col-md-3">
                                <small class="text-muted">浮动收益率</small>
                                <div class="fw-bold text-${portfolio.return_rate > 0 ? 'success' : 'danger'}">
                                    ${formatPercent(portfolio.return_rate)}
                                </div>
                            </div>
                            <div class="col-md-3">
                                <small class="text-muted">持仓数</small>
                                <div class="fw-bold">${portfolio.position_count || 0}</div>
                            </div>
                            <div class="col-md-3">
                                <small class="text-muted">最大权重</small>
                                <div class="fw-bold">${formatPercent(portfolio.max_position_weight || 0)}</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 text-end">
                        <div class="btn-group" role="group">
                            <button class="btn btn-outline-primary" onclick="viewPortfolioDetail('${portfolio.portfolio_id}')">
                                <i class="fas fa-eye"></i> 详情
                            </button>
                            <button class="btn btn-outline-danger" onclick="deletePortfolio('${portfolio.portfolio_id}')">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                        <div class="mt-2">
                            <small class="text-muted">创建于 ${portfolio.created_at || '--'}</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
    
    container.innerHTML = html;
}

// 优化投资组合
async function optimizePortfolio() {
    const method = document.getElementById('optimizationMethod').value;
    const riskLevel = document.getElementById('riskLevel').value;
    const maxStocks = parseInt(document.getElementById('maxStocks').value);
    
    // 显示加载状态
    const button = document.querySelector('button[onclick="optimizePortfolio()"]');
    const originalText = button.innerHTML;
    button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 优化中...';
    button.disabled = true;
    
    try {
        // 根据风险水平设置优化参数
        const riskParams = getRiskParameters(riskLevel);
        const tradeDate = new Date().toISOString().split('T')[0];
        
        const response = await axios.post('/api/ml-factor/portfolio/integrated-selection', {
            trade_date: tradeDate,
            selection_method: 'factor_based',
            factor_list: ['momentum_5d', 'pe_percentile', 'money_flow_strength'],
            weights: {'momentum_5d': 0.4, 'pe_percentile': 0.3, 'money_flow_strength': 0.3},
            top_n: Math.max(maxStocks * 2, 20),
            optimization_method: method,
            constraints: {
                max_weight: riskParams.max_weight,
                min_weight: riskParams.min_weight,
                max_stocks: maxStocks,
                target_return: riskParams.target_return,
                risk_tolerance: riskParams.risk_tolerance
            }
        });
        
        if (response.data.success) {
            // 显示优化结果
            const effectiveMethod = response.data.portfolio_optimization?.method || method;
            showOptimizationResults(response.data.portfolio_optimization, effectiveMethod, riskLevel, maxStocks, response.data);
        } else {
            throw new Error('所有优化方法都失败了: ' + (response.data.error || '未知错误'));
        }
        
    } catch (error) {
        console.error('投资组合优化失败:', error);
        alert('投资组合优化失败: ' + error.message + '\n\n请检查是否有足够的因子数据，或尝试减少最大持股数。');
    } finally {
        // 恢复按钮状态
        button.innerHTML = originalText;
        button.disabled = false;
    }
}

// 根据风险水平获取参数
function getRiskParameters(riskLevel) {
    const params = {
        'conservative': {
            max_weight: 0.08,      // 单只股票最大权重8%
            min_weight: 0.02,      // 单只股票最小权重2%
            target_return: 0.08,   // 目标年化收益率8%
            risk_tolerance: 0.12   // 风险容忍度12%
        },
        'moderate': {
            max_weight: 0.12,      // 单只股票最大权重12%
            min_weight: 0.01,      // 单只股票最小权重1%
            target_return: 0.12,   // 目标年化收益率12%
            risk_tolerance: 0.18   // 风险容忍度18%
        },
        'aggressive': {
            max_weight: 0.20,      // 单只股票最大权重20%
            min_weight: 0.005,     // 单只股票最小权重0.5%
            target_return: 0.18,   // 目标年化收益率18%
            risk_tolerance: 0.25   // 风险容忍度25%
        }
    };
    
    return params[riskLevel] || params['moderate'];
}

// 显示优化结果

    const weights = data.weights || {};
    const stats = data.portfolio_stats || {};
    
    // 创建结果模态框
    const modalHtml = `
        <div class="modal fade" id="optimizationResultModal" tabindex="-1">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fas fa-chart-line"></i> 投资组合优化结果
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <!-- 优化参数 -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <div class="alert alert-info">
                                    <h6><i class="fas fa-cog"></i> 优化参数</h6>
                                    <div class="row">
                                        <div class="col-md-3">
                                            <strong>优化方法:</strong> ${getMethodLabel(method)}
                                        </div>
                                        <div class="col-md-3">
                                            <strong>风险水平:</strong> ${getRiskLabel(riskLevel)}
                                        </div>
                                        <div class="col-md-3">
                                            <strong>最大持股数:</strong> ${maxStocks}只
                                        </div>
                                        <div class="col-md-3">
                                            <strong>实际持股数:</strong> ${Object.keys(weights).length}只
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-3">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <h4 class="text-primary">${formatPercent(stats.expected_return || 0)}</h4>
                                        <p class="card-text">预期收益率</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <h4 class="text-warning">${formatPercent(stats.volatility || 0)}</h4>
                                        <p class="card-text">组合波动率</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <h4 class="text-success">${(stats.sharpe_ratio || 0).toFixed(2)}</h4>
                                        <p class="card-text">夏普比率</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <h4 class="text-info">${formatPercent(stats.max_weight || 0)}</h4>
                                        <p class="card-text">最大权重</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 权重分布 -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h6><i class="fas fa-chart-pie"></i> 权重分布</h6>
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>排名</th>
                                                <th>股票代码</th>
                                                <th>权重</th>
                                                <th>权重可视化</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${Object.entries(weights)
                                                .sort(([,a], [,b]) => b - a)
                                                .map(([ts_code, weight], index) => `
                                                    <tr>
                                                        <td>
                                                            <span class="badge bg-${getWeightBadgeColor(index + 1)}">
                                                                ${index + 1}
                                                            </span>
                                                        </td>
                                                        <td><code>${ts_code}</code></td>
                                                        <td><strong>${formatPercent(weight)}</strong></td>
                                                        <td>

                                                                <div class="progress-bar bg-${getWeightProgressColor(weight)}"

// 获取方法标签
function getMethodLabel(method) {
    const labels = {
        'mean_variance': '均值方差优化',
        'risk_parity': '风险平价',
        'equal_weight': '等权重',
        'factor_neutral': '因子中性优化'
    };
    return labels[method] || method;
}

// 获取风险标签
function getRiskLabel(riskLevel) {
    const labels = {
        'conservative': '保守型',
        'moderate': '稳健型',
        'aggressive': '积极型'
    };
    return labels[riskLevel] || riskLevel;
}

// 获取权重徽章颜色
function getWeightBadgeColor(rank) {
    if (rank <= 3) return 'success';
    if (rank <= 10) return 'primary';
    if (rank <= 20) return 'warning';
    return 'secondary';
}

// 获取权重进度条颜色
function getWeightProgressColor(weight) {
    if (weight >= 0.15) return 'danger';
    if (weight >= 0.10) return 'warning';
    if (weight >= 0.05) return 'primary';
    return 'success';
}

// 计算权重标准差
function calculateWeightStd(weights) {
    const values = Object.values(weights);
    const mean = values.reduce((sum, w) => sum + w, 0) / values.length;
    const variance = values.reduce((sum, w) => sum + Math.pow(w - mean, 2), 0) / values.length;
    return Math.sqrt(variance);
}

// 计算有效股票数
function calculateEffectiveStocks(weights) {
    const sumSquaredWeights = Object.values(weights).reduce((sum, w) => sum + w * w, 0);
    return 1 / sumSquaredWeights;
}

async function saveOptimizedPortfolio() {
    if (!window.currentOptimizationResult) {
        alert('没有优化结果可保存');
        return;
    }

    const portfolioId = prompt(
        '请输入投资组合ID:',
        `portfolio_${new Date().toISOString().split('T')[0].replace(/-/g, '')}`
    );

    if (!portfolioId) {
        return;
    }

    try {
        const response = await axios.post('/api/ml-factor/portfolio/save-optimized', {
            portfolio_id: portfolioId,
            total_capital: 1000000,
            weights: window.currentOptimizationResult.weights,
        });

        if (response.data.success) {
            alert(`投资组合保存成功: ${portfolioId}`);
            bootstrap.Modal.getInstance(document.getElementById('optimizationResultModal')).hide();
            await loadPortfolios();
            return;
        }

        throw new Error(response.data.error || '保存投资组合失败');
    } catch (error) {
        console.error('保存投资组合失败:', error);
        alert('保存投资组合失败: ' + (error.response?.data?.error || error.message));
    }
}

async function previewPortfolioRebalance() {
    if (!window.currentOptimizationResult) {
        alert('没有优化结果可用于再平衡');
        return;
    }

    const portfolioId = prompt('请输入要对比的现有组合ID:', currentPortfolioId || portfolios[0]?.portfolio_id || '');
    if (!portfolioId) {
        return;
    }

    try {
        const detailResponse = await axios.get(`/api/ml-factor/portfolio/${portfolioId}`);
        const portfolio = detailResponse.data.portfolio;
        const positions = portfolio.positions || [];

        if (positions.length === 0) {
            throw new Error('该组合暂无可用于再平衡的持仓');
        }

        const totalMarketValue = positions.reduce((sum, position) => sum + (position.market_value || 0), 0);
        if (!totalMarketValue) {
            throw new Error('该组合缺少有效市值数据，无法计算当前权重');
        }

        const currentWeights = {};
        positions.forEach((position) => {
            currentWeights[position.ts_code] = (position.market_value || 0) / totalMarketValue;
        });

        const rebalanceResponse = await axios.post('/api/ml-factor/portfolio/rebalance', {
            current_weights: currentWeights,
            target_weights: window.currentOptimizationResult.weights,
            transaction_cost: 0.001,
        });

        renderRebalancePreview(portfolioId, rebalanceResponse.data);
        new bootstrap.Modal(document.getElementById('rebalancePreviewModal')).show();
    } catch (error) {
        console.error('再平衡预览失败:', error);
        alert('再平衡预览失败: ' + (error.response?.data?.error || error.message));
    }
}

    const instructions = Object.entries(result.trade_instructions || {});
    const content = document.getElementById('rebalancePreviewContent');

    if (instructions.length === 0) {
        content.innerHTML = `<div class="alert alert-info mb-0">组合 ${portfolioId} 当前权重已与目标权重一致，无需再平衡。</div>`;
        return;
    }

    content.innerHTML = `
        <div class="alert alert-warning">
            当前仅提供再平衡预览，不会自动改写真实持仓。
        </div>
        <div class="row mb-3">
            <div class="col-md-4">
                <strong>组合ID:</strong> ${portfolioId}
            </div>
            <div class="col-md-4">
                <strong>换手率:</strong> ${formatPercent(result.turnover || 0)}
            </div>
            <div class="col-md-4">
                <strong>估算成本:</strong> ${formatPercent(result.transaction_cost || 0)}
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-sm">
                <thead>
                    <tr>
                        <th>股票代码</th>
                        <th>调整方向</th>
                        <th>权重变化</th>
                    </tr>
                </thead>
                <tbody>
                    ${instructions.map(([tsCode, weight]) => `
                        <tr>
                            <td><code>${tsCode}</code></td>
                            <td>${weight > 0 ? '增持/买入' : '减持/卖出'}</td>
                            <td class="text-${weight > 0 ? 'success' : 'danger'}">${formatPercent(Math.abs(weight))}</td>
                        </tr>
                    `).join('')}

    `;
}

// 导出优化结果
function exportOptimizationResults() {
    if (!window.currentOptimizationResult) {
        alert('没有优化结果可导出');
        return;
    }
    
    const result = window.currentOptimizationResult;
    
    // 创建CSV内容
    const headers = ['股票代码', '权重(%)', '权重(小数)', '排名'];
    const csvContent = [
        `# 投资组合优化结果`,
        `# 优化方法: ${getMethodLabel(result.method)}`,
        `# 风险水平: ${getRiskLabel(result.riskLevel)}`,
        `# 预期收益率: ${formatPercent(result.stats.expected_return || 0)}`,
        `# 组合波动率: ${formatPercent(result.stats.volatility || 0)}`,
        `# 夏普比率: ${(result.stats.sharpe_ratio || 0).toFixed(2)}`,
        `# 生成时间: ${new Date().toLocaleString()}`,
        '',
        headers.join(','),
        ...Object.entries(result.weights)
            .sort(([,a], [,b]) => b - a)
            .map(([ts_code, weight], index) => [
                ts_code,
                (weight * 100).toFixed(2),
                weight.toFixed(6),
                index + 1
            ].join(','))
    ].join('\n');
    
    // 创建下载链接
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', `投资组合优化结果_${result.method}_${new Date().toISOString().split('T')[0]}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function openPositionModal(portfolioId, position = null) {
    currentPortfolioId = portfolioId;
    editingPositionId = position ? position.id : null;

    document.getElementById('portfolioPositionModalTitle').textContent = editingPositionId ? '编辑持仓' : '新增持仓';
    document.getElementById('portfolioPositionSubmitButton').textContent = editingPositionId ? '保存修改' : '保存持仓';
    document.getElementById('positionTsCode').value = position?.ts_code || '';
    document.getElementById('positionTsCode').disabled = Boolean(editingPositionId);
    document.getElementById('positionSizeInput').value = position?.position_size || '';
    document.getElementById('positionAvgCostInput').value = position?.avg_cost || '';
    document.getElementById('positionCurrentPriceInput').value = position?.current_price || '';
    document.getElementById('positionSectorInput').value = position?.sector || '';
    document.getElementById('positionStopLossInput').value = position?.stop_loss_price || '';
    document.getElementById('positionTakeProfitInput').value = position?.take_profit_price || '';

    new bootstrap.Modal(document.getElementById('portfolioPositionModal')).show();
}

async function submitPortfolioPosition() {
    const portfolioId = currentPortfolioId;
    const method = editingPositionId ? 'put' : 'post';
    const url = editingPositionId
        ? `/api/realtime-analysis/risk/portfolio/${portfolioId}/positions/${editingPositionId}`
        : '/api/realtime-analysis/risk/portfolio';
    const payload = {
        position_size: parseFloat(document.getElementById('positionSizeInput').value),
        avg_cost: parseFloat(document.getElementById('positionAvgCostInput').value),
        sector: document.getElementById('positionSectorInput').value.trim() || null,
        stop_loss_price: parseOptionalFloat('positionStopLossInput'),
        take_profit_price: parseOptionalFloat('positionTakeProfitInput'),
    };

    if (!portfolioId || !payload.position_size || !payload.avg_cost) {
        alert('请填写完整的持仓信息');
        return;
    }

    if (editingPositionId) {
        payload.current_price = parseOptionalFloat('positionCurrentPriceInput');
    } else {
        payload.portfolio_id = portfolioId;
        payload.ts_code = document.getElementById('positionTsCode').value.trim();
        if (!payload.ts_code) {
            alert('请填写股票代码');
            return;
        }
    }

    Object.keys(payload).forEach((key) => {
        if (payload[key] === null || payload[key] === undefined || Number.isNaN(payload[key])) {
            delete payload[key];
        }
    });

    try {
        const response = await axios({
            method: method,
            url: url,
            data: payload,
        });

        if (response.data.success) {
            alert(editingPositionId ? '持仓更新成功' : '持仓新增成功');
            bootstrap.Modal.getInstance(document.getElementById('portfolioPositionModal')).hide();
            document.getElementById('portfolioPositionForm').reset();
            editingPositionId = null;
            await loadPortfolios();
            await viewPortfolioDetail(portfolioId);
            return;
        }

        throw new Error(response.data.message || '持仓保存失败');
    } catch (error) {
        console.error('持仓保存失败:', error);
        alert('持仓保存失败: ' + (error.response?.data?.message || error.message));
    }
}

async function deletePortfolio(portfolioId) {
    if (!confirm(`确定要删除投资组合吗？\n组合: ${portfolioId}\n该操作会将该组合下所有持仓标记为非活跃。`)) {
        return;
    }

    try {
        const response = await axios.delete(`/api/ml-factor/portfolio/${portfolioId}`);
        if (response.data.success) {
            alert(`投资组合删除成功: ${portfolioId}`);
            await loadPortfolios();
            return;
        }

        throw new Error(response.data.error || '删除投资组合失败');
    } catch (error) {
        console.error('删除投资组合失败:', error);
        alert('删除投资组合失败: ' + (error.response?.data?.error || error.message));
    }
}

function parseOptionalFloat(elementId) {
    const value = document.getElementById(elementId).value;
    if (value === '') {
        return null;
    }
    return parseFloat(value);
}

async function deletePortfolioPosition(portfolioId, positionId) {
    if (!confirm(`确定要删除该持仓吗？\n组合: ${portfolioId}\n持仓ID: ${positionId}`)) {
        return;
    }

    try {
        const response = await axios.delete(
            `/api/realtime-analysis/risk/portfolio/${portfolioId}/positions/${positionId}`
        );
        if (response.data.success) {
            alert(`持仓删除成功: ${positionId}`);
            await loadPortfolios();
            await viewPortfolioDetail(portfolioId);
            return;
        }

        throw new Error(response.data.message || '删除持仓失败');
    } catch (error) {
        console.error('删除持仓失败:', error);
        alert('删除持仓失败: ' + (error.response?.data?.message || error.message));
    }
}

// 格式化金额
function formatAmount(amount) {
    if (amount >= 100000000) {
        return (amount / 100000000).toFixed(2) + '亿';
    } else if (amount >= 10000) {
        return (amount / 10000).toFixed(2) + '万';
    }
    return amount.toFixed(2);
}

// 格式化百分比
function formatPercent(value) {
    return (value * 100).toFixed(2) + '%';
}

// 显示错误信息
function showError(elementId, message) {
    const element = document.getElementById(elementId);
    if (element) {
        element.innerHTML = `<div class="alert alert-danger">${message}</div>`;
    }
}
