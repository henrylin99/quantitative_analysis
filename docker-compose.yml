version: "3.9"

services:
  web:
    build: .
    command: python run.py
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DATA_DIR=/app/data
      - SQLITE_DATABASE_PATH=/app/instance/stock_cursor.sqlite3
    volumes:
      - ./data:/app/data
      - ./instance:/app/instance
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.celery_app.celery worker -l info -P solo
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DATA_DIR=/app/data
      - SQLITE_DATABASE_PATH=/app/instance/stock_cursor.sqlite3
    volumes:
      - ./data:/app/data
      - ./instance:/app/instance
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
