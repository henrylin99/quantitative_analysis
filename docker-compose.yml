version: "3.9"

services:
  web:
    build: .
    command: python run.py
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.celery_app.celery worker -l info -P solo
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
